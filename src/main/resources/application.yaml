spring:
  application:
    name: mcp

  # MCP Server Configuration
  ai:
    mcp:
      server:
        name: mcp
        version: 0.1.1
        protocol: streamable
        stdio: false
        type: sync

server:
  port: 9000

management:
  endpoints:
    web:
      exposure:
        include: health,info # Or use '*' to expose all
