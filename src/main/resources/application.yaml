spring:
  application:
    name: mcp

  http:
    serviceclient:
      loki:
        base-url: http://loki.k8s.lab
        connect-timeout: 10s
        read-timeout: 30s
#      prometheus:
#      argoCD:
#      jenkins:



  # MCP Server Configuration
  ai:
    mcp:
      server:
        name: mcp
        version: 0.1.1
        protocol: streamable
        stdio: false
        type: sync

server:
  port: 9000

management:
  endpoints:
    web:
      exposure:
        include: health,info

mcp:
  kubernetes:
    # Maximum number of events returned by get-events tool.
    max-events: 500
    # Timeouts for Kubernetes API server communication.
    connection-timeout: 10s
    read-timeout: 30s
  monitoring:
    loki:
      # Optional Grafana basic auth for the Loki client (see spring.http.serviceclient.loki for URL/timeouts).
      username: ${GRAFANA_USERNAME:}
      password: ${GRAFANA_PASSWORD:}
