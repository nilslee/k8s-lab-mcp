spring:
  application:
    name: mcp

  http:
    serviceclient:
      loki:
        base-url: http://loki.k8s.lab
        connect-timeout: 10s
        read-timeout: 30s
      prometheus:
        base-url: http://prometheus.k8s.lab
        connect-timeout: 10s
        read-timeout: 30s
      argocd-auth:
        base-url: http://argocd.k8s.lab
        connect-timeout: 10s
        read-timeout: 30s
      argocd-data:
        base-url: http://argocd.k8s.lab
        connect-timeout: 10s
        read-timeout: 30s
#      jenkins:



  # MCP Server Configuration
  ai:
    mcp:
      server:
        name: mcp
        version: 0.1.1
        protocol: streamable
        stdio: false
        type: sync

server:
  port: 9000

management:
  endpoints:
    web:
      exposure:
        include: health,info

mcp:
  # When true (default), @McpTool methods that return JSON text rewrite a top-level data[] to a JSON string
  # so Cursor / MCP Inspector keep the payload. Disable if you need raw Loki-style arrays.
  tool-response:
    serialize-top-level-data-json-array: true
  kubernetes:
    # Maximum number of events returned by get-events tool.
    max-events: 500
    # Timeouts for Kubernetes API server communication.
    connection-timeout: 10s
    read-timeout: 30s
  monitoring:
    loki:
      # Optional Grafana basic auth for the Loki client (see spring.http.serviceclient.loki for URL/timeouts).
      username: ${GRAFANA_USERNAME:}
      password: ${GRAFANA_PASSWORD:}
#    prometheus:
  gitops:
    argocd:
      # 401 "no session information" on GitOps tools: ensure Secret mcp-service-account (key password) matches Argo CD;
      # first-time bootstrap also needs Secret argocd-initial-admin-secret (see ArgoCDServiceAccountPasswordResolver).
      namespace: argocd
      service-account-name: mcp-service-account  # Service account created from argocd values
      initial-secret-name: argocd-initial-admin-secret  # Secret that contains initial admin password
      service-account-secret-name: mcp-service-account  # Secret name that contains new password for mcp service account. Created at runtime

#    jenkins:

