services:
  db:
    image: postgres:18.3-trixie
    restart: unless-stopped
    environment:
      POSTGRES_DB: diagnostics
      # Jenkins: POSTGRES = credentials('mcp-postgres') → POSTGRES_USR / POSTGRES_PSW
      POSTGRES_USER: ${POSTGRES_USR:-mcp}
      POSTGRES_PASSWORD: ${POSTGRES_PSW:-mcp}
    ports:
      - "5432:5432"            # Maps Host Port:Container Port
    volumes:
      - postgres_data:/var/lib/postgresql # Persists data between restarts
    healthcheck:
      # pg_isready defaults -d to the username; only POSTGRES_DB exists (e.g. diagnostics), so pass -d explicitly.
      test: [ "CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    image: ${IMAGE_NAME}
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    network_mode: host
    mem_limit: 512m
    memswap_limit: 512m
    environment:
      SPRING_PROFILES_ACTIVE: runner
      # :- avoids compose warnings when vars unset (e.g. docker compose logs from a shell without Jenkins creds)
      GRAFANA_USERNAME: ${GRAFANA_LOKI_USR:-}
      GRAFANA_PASSWORD: ${GRAFANA_LOKI_PSW:-}
    volumes:
      - ${KUBECONFIG_PATH}:/app/kubeconfig:ro
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    # Default 8090: Jenkins controller binds 127.0.0.1:8080 on runner-ci — do not publish pgAdmin on 8080.
    ports:
      - "${PGADMIN_HOST_PORT:-8090}:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:      #  Named volume for persistent storage
#   - ./init.sql:/docker-entrypoint-initdb.d/init.sql
